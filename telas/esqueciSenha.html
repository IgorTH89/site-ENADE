<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ENADE Questões | Recuperar senha</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">

    <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <script src="https://cdn.tailwindcss.com"></script>

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif']
                    },
                    colors: {
                        primary: '#0B1F3A',
                        secondary: '#2563EB',
                        accent: '#38BDF8',
                        textSec: '#CBD5E1'
                    }
                }
            }
        }
    </script>

    <style>
        body {
            font-family: 'Inter', sans-serif;
            background: #0B1F3A;
            color: white;
            overflow-x: hidden;
        }

        .hero-bg {
            background: linear-gradient(135deg, #0B1F3A 0%, #0a1426 50%, #1e3a8a 100%);
            min-height: 100vh;
            position: relative;
        }

        .shape-blob {
            position: absolute;
            filter: blur(90px);
            opacity: .35;
            animation: pulse 10s infinite alternate;
        }

        @keyframes pulse {
            from {
                transform: scale(1);
            }

            to {
                transform: scale(1.2) translate(20px, -20px);
            }
        }

        .glass {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(18px);
            border: 1px solid rgba(255, 255, 255, .08);
            box-shadow: 0 8px 32px rgba(0, 0, 0, .3);
        }

        .btn-glow {
            transition: .3s;
        }

        .btn-glow:hover {
            transform: translateY(-2px) scale(1.02);
            box-shadow: 0 0 25px rgba(37, 99, 235, .45);
        }

        #tsparticles {
            position: absolute;
            inset: 0;
            z-index: 1;
        }
    </style>
</head>

<body>

    <section class="hero-bg flex flex-col relative overflow-hidden">

        <div class="shape-blob bg-blue-500 w-[500px] h-[500px] rounded-full top-[-100px] left-[-100px]"></div>
        <div class="shape-blob bg-cyan-400 w-[400px] h-[400px] rounded-full bottom-[-100px] right-[-100px]"></div>

        <div id="tsparticles"></div>

        <!-- NAVBAR -->
        <nav class="w-full z-50 py-6 relative">
            <div class="container mx-auto px-6 flex justify-between items-center">

                <div onclick="window.location.href='../index.html'"
                    class="cursor-pointer flex items-center gap-3">
                    <div
                        class="w-10 h-10 rounded-lg bg-gradient-to-br from-secondary to-accent flex items-center justify-center font-bold">
                        E
                    </div>
                    <span class="font-bold text-xl">
                        ENADE Questões
                    </span>
                </div>

                <a href="login.html"
                    class="text-sm text-textSec hover:text-white transition">
                    Voltar ao login
                </a>

            </div>
        </nav>

        <!-- CONTEÚDO -->
        <div class="flex-grow flex items-center justify-center px-6 relative z-10">

            <div class="w-full max-w-[500px]">

                <div class="text-center mb-8">

                    <h1 class="text-4xl font-bold mb-4">
                        Recuperar
                        <span
                            class="text-transparent bg-clip-text bg-gradient-to-r from-accent to-secondary">
                            senha
                        </span>
                    </h1>

                    <p class="text-textSec leading-relaxed">
                        Informe seu e-mail cadastrado e enviaremos um link seguro
                        para redefinir sua senha.
                    </p>

                </div>

                <div class="glass rounded-3xl p-8 relative overflow-hidden">

                    <div
                        class="absolute -top-20 -right-20 w-40 h-40 bg-blue-500/10 blur-3xl rounded-full">
                    </div>

                    <div
                        class="absolute -bottom-20 -left-20 w-40 h-40 bg-cyan-400/10 blur-3xl rounded-full">
                    </div>

                    <form id="recoverForm" class="space-y-6">

                        <div>

                            <label class="text-xs font-semibold text-textSec block mb-2">
                                E-mail cadastrado
                            </label>

                            <div class="relative">

                                <div
                                    class="absolute left-4 top-1/2 -translate-y-1/2 text-textSec/60">
                                    <i class="fa-solid fa-envelope"></i>
                                </div>

                                <input
                                    type="email"
                                    required
                                    placeholder="voce@universidade.com"
                                    class="w-full pl-11 pr-4 py-4 rounded-2xl bg-white/5 border border-white/10 text-white placeholder:text-textSec/40 focus:outline-none focus:ring-1 focus:ring-accent focus:border-accent">

                            </div>

                        </div>

                        <button
                            type="submit"
                            class="w-full py-4 rounded-full bg-secondary font-semibold btn-glow flex justify-center items-center gap-2">

                            Enviar link de recuperação

                            <i class="fa-solid fa-paper-plane"></i>

                        </button>

                    </form>

                    <div
                        id="successMessage"
                        class="hidden mt-6 p-4 rounded-2xl bg-green-500/10 border border-green-400/20 text-green-300 text-sm text-center">

                        <i class="fa-solid fa-circle-check mr-2"></i>
                        Link enviado com sucesso. Verifique seu e-mail.

                    </div>

                </div>

            </div>

        </div>

    </section>

    <script src="https://cdn.jsdelivr.net/npm/@tsparticles/slim@3.3.0/tsparticles.slim.bundle.min.js"></script>

    <script>
        const form = document.getElementById('recoverForm');
        const success = document.getElementById('successMessage');

        form.addEventListener('submit', function (e) {
            e.preventDefault();

            success.classList.remove('hidden');
            form.reset();
        });

        tsParticles.load({
            id: "tsparticles",
            options: {
                particles: {
                    number: {
                        value: 40
                    },
                    color: {
                        value: ["#38BDF8", "#2563EB"]
                    },
                    opacity: {
                        value: 0.3
                    },
                    size: {
                        value: {
                            min: 1,
                            max: 4
                        }
                    },
                    move: {
                        enable: true,
                        speed: 1
                    }
                }
            }
        });
    </script>

</body>

</html>
