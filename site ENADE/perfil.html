<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Perfil | ENADE Questões</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Inter', 'sans-serif'] },
                    colors: {
                        primary: '#0B1F3A',
                        secondary: '#2563EB',
                        accent: '#38BDF8',
                        success: '#22C55E',
                        textMain: '#FFFFFF',
                        textSec: '#CBD5E1',
                    }
                }
            }
        }
    </script>
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #0B1F3A; color: #FFFFFF; overflow-x: hidden; }
        .hero-bg { background: linear-gradient(135deg, #0B1F3A 0%, #0a1426 50%, #1e3a8a 100%); position: relative; }
        .shape-blob { position: absolute; filter: blur(80px); z-index: 0; opacity: 0.4; animation: pulse-blob 10s infinite alternate; }
        @keyframes pulse-blob { 0% { transform: scale(1) translate(0, 0); } 100% { transform: scale(1.1) translate(20px, -20px); } }
        .glass { background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px); border: 1px solid rgba(255, 255, 255, 0.1); box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.2); }
        .glass-nav { background: rgba(11, 31, 58, 0.85); backdrop-filter: blur(12px); border-bottom: 1px solid rgba(255, 255, 255, 0.1); }
        .btn-glow { transition: all 0.3s ease; }
        .btn-glow:hover { transform: scale(1.05) translateY(-2px); box-shadow: 0 10px 25px -5px rgba(37, 99, 235, 0.5); }
        .glass-card { transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        .glass-card:hover { transform: translateY(-5px); border-color: rgba(56, 189, 248, 0.3); box-shadow: 0 15px 35px 0 rgba(56, 189, 248, 0.1); }
    </style>
</head>
<body class="antialiased hero-bg min-h-screen flex flex-col">

    <div class="shape-blob bg-secondary w-[500px] h-[500px] rounded-full top-[-100px] left-[-100px]"></div>
    <div class="shape-blob bg-accent w-[400px] h-[400px] rounded-full bottom-[-50px] right-[-50px]" style="animation-delay: 2s;"></div>

    <nav id="navbar" class="glass-nav fixed w-full z-50 py-4">
        <div class="container mx-auto px-6 md:px-12 flex justify-between items-center">
            <a href="telaInicial.html" class="flex items-center gap-2 cursor-pointer" data-aos="fade-down">
                <div class="w-10 h-10 rounded-lg bg-gradient-to-br from-secondary to-accent flex items-center justify-center font-bold text-xl shadow-lg shadow-secondary/30">E</div>
                <span class="font-bold text-xl tracking-tight">ENADE Questões</span>
            </a>
            <div class="hidden md:flex items-center gap-8" data-aos="fade-down" data-aos-delay="100">
                <a href="telaInicial.html" class="text-textSec hover:text-white transition-colors text-sm font-medium">Início</a>
                <a href="telaQuestoes.html" class="text-textSec hover:text-white transition-colors text-sm font-medium">Questões</a>
                <a href="telaSimulados.html" class="text-textSec hover:text-white transition-colors text-sm font-medium">Simulados</a>
                <a href="telaDesempenho.html" class="text-textSec hover:text-white transition-colors text-sm font-medium">Desempenho</a>
                <a href="configuracoes.html" class="text-white transition-colors text-sm font-medium border-b-2 border-accent pb-1">Configurações</a>
            </div>
            <div class="hidden md:block" data-aos="fade-down" data-aos-delay="200">
                <a href="perfil.html" class="bg-white/10 text-white border border-white/20 px-5 py-2 rounded-full font-semibold text-sm hover:bg-white/20 transition-all flex items-center gap-2">
                    <i class="fa-solid fa-user text-accent"></i> Meu Perfil
                </a>
            </div>
        </div>
    </nav>

    <main class="container mx-auto px-6 md:px-12 flex-grow flex items-center justify-center pt-32 pb-20 z-10">
        <div class="w-full max-w-2xl glass rounded-[2rem] p-8 md:p-12 relative overflow-hidden" data-aos="zoom-in" data-aos-duration="600">
            <div class="absolute top-0 left-0 w-full h-1 bg-gradient-to-r from-secondary via-accent to-secondary"></div>
            
            <div class="flex flex-col items-center text-center mb-10">
                <div class="w-24 h-24 bg-gradient-to-br from-secondary/30 to-accent/30 rounded-2xl flex items-center justify-center border border-white/10 shadow-xl mb-6">
                    <i class="fa-solid fa-user-gradient text-4xl text-accent"></i>
                </div>
                <h1 id="nomePerfil" class="text-3xl md:text-4xl font-bold tracking-tight mb-2">Carregando...</h1>
                <p id="emailPerfil" class="text-textSec text-base">estudante@faculdade.edu.br</p>
            </div>

            <div class="grid grid-cols-1 sm:grid-cols-2 gap-4 mb-8">
                <div class="glass glass-card p-6 rounded-2xl">
                    <span class="text-[10px] font-bold uppercase tracking-[0.2em] text-accent block mb-1">Curso Acadêmico</span>
                    <p id="cursoPerfil" class="text-white font-semibold text-lg">Ciência da Computação</p>
                </div>
                <div class="glass glass-card p-6 rounded-2xl">
                    <span class="text-[10px] font-bold uppercase tracking-[0.2em] text-accent block mb-1">Nível de Acesso</span>
                    <p id="nivelPerfil" class="text-white font-semibold text-lg">Estudante</p>
                </div>
            </div>

            <div class="flex flex-col gap-4">
                <a href="configuracoes.html" class="w-full bg-secondary text-white py-4 rounded-full font-semibold text-center btn-glow block shadow-lg shadow-secondary/20">
                    Editar Dados Cadastrais <i class="fa-solid fa-user-pen ml-2"></i>
                </a>
                <button onclick="fazerLogout()" class="text-sm font-semibold text-textSec hover:text-red-400 transition-colors py-2">
                    <i class="fa-solid fa-arrow-right-from-bracket mr-2"></i> Encerrar Sessão
                </button>
            </div>
        </div>
    </main>

    <footer class="text-center py-4 text-xs text-textMuted border-t border-white/5">
        &copy; 2026 ENADE Questões — Backend Java & Frontend Blindado.
    </footer>
    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script>
        AOS.init({ once: true, duration: 800, easing: 'ease-out-cubic' });

        document.addEventListener("DOMContentLoaded", () => {
            const usuarioLogado = sessionStorage.getItem('usuarioLogado');
            const nomeReal = sessionStorage.getItem('usuarioNome');
            const emailReal = sessionStorage.getItem('usuarioEmail');
            
            // Pega o curso e o nível salvos dinamicamente
            const cursoReal = sessionStorage.getItem('usuarioCurso') || "Ciência da Computação";
            const nivelReal = sessionStorage.getItem('usuarioNivel') || "Estudante";

            if (usuarioLogado === "true" && nomeReal) {
                document.getElementById('nomePerfil').innerText = nomeReal;
                document.getElementById('cursoPerfil').innerText = cursoReal;
                document.getElementById('nivelPerfil').innerText = nivelReal;
                
                if (emailReal) {
                    document.getElementById('emailPerfil').innerText = emailReal;
                } else {
                    document.getElementById('emailPerfil').innerText = nomeReal.toLowerCase().replace(/\s+/g, '') + "@faculdade.edu.br";
                }
            } else {
                window.location.href = 'login.html';
            }
        });

        function fazerLogout() {
            sessionStorage.clear();
            localStorage.removeItem('grafico_acertos');
            localStorage.removeItem('grafico_erros');
            window.location.href = 'login.html';
        }
    </script>
</body>
</html>
