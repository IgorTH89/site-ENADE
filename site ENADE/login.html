<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>ENADE Questões | Entrar</title>
    <meta name="description"
        content="Acesse o portal do ENADE Questões com milhares de simulados e questões resolvidas comentadas por especialistas." />

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">

    <!-- Font Awesome -->
    <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <!-- AOS -->
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">

    <!-- Tailwind -->
    <script src="https://cdn.tailwindcss.com"></script>

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                    },
                    colors: {
                        primary: '#0B1F3A',
                        secondary: '#2563EB',
                        accent: '#38BDF8',
                        success: '#22C55E',
                        textMain: '#FFFFFF',
                        textSec: '#CBD5E1',
                    }
                }
            }
        }
    </script>

    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #0B1F3A;
            color: white;
            overflow-x: hidden;
        }

        .hero-bg {
            background: linear-gradient(135deg, #0B1F3A 0%, #0a1426 50%, #1e3a8a 100%);
            position: relative;
        }

        .shape-blob {
            position: absolute;
            filter: blur(80px);
            opacity: 0.4;
            z-index: 0;
        }

        .glass {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .btn-glow:hover {
            transform: scale(1.03);
            transition: 0.3s;
        }

        #tsparticles {
            position: absolute;
            inset: 0;
            z-index: 1;
            pointer-events: none;
        }
    </style>
</head>

<body class="antialiased">

    <section class="hero-bg min-h-screen relative overflow-hidden flex flex-col">

        <div class="shape-blob bg-secondary w-[500px] h-[500px] rounded-full top-[-100px] left-[-100px]"></div>
        <div class="shape-blob bg-accent w-[400px] h-[400px] rounded-full bottom-[-50px] right-[-50px]"></div>

        <div id="tsparticles"></div>

        <!-- NAVBAR -->
        <nav class="fixed w-full z-50 py-5">
            <div class="container mx-auto px-6 md:px-12 flex justify-between items-center">

                <div class="flex items-center gap-2 cursor-pointer"
                    onclick="voltarInicioSemLogin()">
                    <div
                        class="w-10 h-10 rounded-lg bg-gradient-to-br from-secondary to-accent flex items-center justify-center font-bold text-xl">
                        E
                    </div>
                    <span class="font-bold text-xl tracking-tight">
                        ENADE Questões
                    </span>
                </div>

                <button class="md:hidden text-white text-2xl" id="mobile-menu-btn">
                    <i class="fa-solid fa-bars"></i>
                </button>
            </div>
        </nav>

        <!-- CONTEÚDO -->
        <div class="container mx-auto px-6 md:px-12 flex-grow flex items-center justify-center z-10">

            <div class="glass w-full max-w-[480px] p-8 rounded-3xl">

                <h1 class="text-4xl font-bold text-center mb-4">
                    Acesse seu
                    <span class="text-transparent bg-clip-text bg-gradient-to-r from-accent to-secondary">
                        painel
                    </span>
                </h1>

                <p class="text-textSec text-center mb-8">
                    Faça login para continuar.
                </p>

                <!-- FORM -->
                <form class="space-y-5"
                    onsubmit="event.preventDefault(); fazerLogin();">

                    <div>
                        <label class="text-xs text-textSec">E-mail</label>
                        <input type="email"
                            required
                            placeholder="exemplo@estudante.com"
                            class="w-full mt-2 px-4 py-3 rounded-2xl bg-white/5 border border-white/10 text-white">
                    </div>

                    <div>
                        <div class="flex justify-between items-center">
                            <label class="text-xs text-textSec">
                                Senha
                            </label>

                            <a href="esqueciSenha.html"
                                class="text-xs text-accent hover:underline">
                                Esqueci minha senha
                            </a>
                        </div>

                        <div class="relative mt-2">
                            <input id="password"
                                type="password"
                                required
                                placeholder="••••••••"
                                class="w-full px-4 py-3 rounded-2xl bg-white/5 border border-white/10 text-white">

                            <button id="password-toggle"
                                type="button"
                                class="absolute right-4 top-1/2 -translate-y-1/2">
                                <i id="password-toggle-icon"
                                    class="fa-solid fa-eye"></i>
                            </button>
                        </div>
                    </div>

                    <button type="submit"
                        class="w-full bg-secondary py-3 rounded-full font-semibold btn-glow">
                        Entrar
                    </button>

                </form>

                <!-- CADASTRO -->
                <div class="text-center mt-6 text-sm text-textSec">
                    Não tem uma conta?
                    <a href="telaCadastro.html"
                        class="text-accent hover:underline font-semibold">
                        Cadastre-se na plataforma
                    </a>
                </div>

            </div>
        </div>
    </section>

    <!-- SCRIPTS -->
    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tsparticles/slim@3.3.0/tsparticles.slim.bundle.min.js"></script>

    <script>
        AOS.init();

        // Mostrar/Ocultar senha
        const passwordInput = document.getElementById('password');
        const passwordToggle = document.getElementById('password-toggle');
        const passwordIcon = document.getElementById('password-toggle-icon');

        passwordToggle.addEventListener('click', () => {
            if (passwordInput.type === 'password') {
                passwordInput.type = 'text';
                passwordIcon.className = 'fa-solid fa-eye-slash';
            } else {
                passwordInput.type = 'password';
                passwordIcon.className = 'fa-solid fa-eye';
            }
        });

        // LOGIN
        async function fazerLogin() {
    // Captura os dados digitados nos inputs
    const email = document.querySelector('input[type="email"]').value.trim();
    const senha = document.getElementById('password').value;

    const payload = {
        email: email,
        senha: senha
    };

    try {
        const response = await fetch("http://localhost:8080/api/auth/login", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify(payload)
        });

        if (response.ok) {
            const usuarioObj = await response.json();
            
            // Salva as credenciais da sessão no navegador
            sessionStorage.setItem('usuarioLogado', 'true');
            sessionStorage.setItem('usuarioId', usuarioObj.id);
            sessionStorage.setItem('usuarioNome', usuarioObj.nome);
            sessionStorage.setItem('usuarioEmail', usuarioObj.email);

            // Redireciona com sucesso
            window.location.href = 'telaInicial.html';
        } else if (response.status === 401) {
            alert("Senha incorreta ou e-mail inválido!");
        } else {
            alert("Usuário não cadastrado no sistema!");
        }
    } catch (error) {
        console.error("Erro:", error);
        alert("Não foi possível conectar ao servidor backend!");
    }
}
    </script>

</body>
</html>
